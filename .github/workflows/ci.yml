name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # 22.13.0 is the floor (node:sqlite unflagged there). Its bundled SQLite has
        # no FTS5, so this leg also exercises the keyword-scoring fallback; 24.x
        # exercises the FTS5/BM25 path. Pinned exactly so the floor is really tested.
        node: ['22.13.0', '24.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: unit tests
        run: node --test
      - name: end-to-end smoke (temp vault)
        run: node scripts/smoke.mjs
      - name: zero dependencies, forever
        run: |
          node -e "const p=require('./package.json');const d=Object.keys(p.dependencies||{});if(d.length){console.error('dependencies found:',d);process.exit(1)}"
