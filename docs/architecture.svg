<svg viewBox="0 0 940 566" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="unified-mem architecture: a Claude Code session reads memory from and queues its transcript into a central vault; a background worker distills and scores notes, and a nightly job maintains them, forming a closed learning loop.">
  <style>
    :root{
      --ink:#1f2328; --muted:#656d76; --line:#d0d7de; --panel:#ffffff; --sub:#f6f8fa;
    }
    @media (prefers-color-scheme: dark){
      :root{ --ink:#e6edf3; --muted:#8b949e; --line:#30363d; --panel:#0d1117; --sub:#161b22; }
    }
    .ink{ fill:var(--ink); }
    .muted{ fill:var(--muted); }
    .panel{ fill:var(--panel); stroke:var(--line); stroke-width:1.25; }
    .sub{ fill:var(--sub); stroke:var(--line); stroke-width:1; }
    .mono{ font-family:ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace; }
    .t-title{ font-size:15px; font-weight:700; letter-spacing:.2px; }
    .t-vault{ font-size:17px; font-weight:800; letter-spacing:1.5px; }
    .t-lbl{ font-size:12px; }
    .t-code{ font-size:11.5px; }
    .t-arrow{ font-size:11px; font-weight:600; }
    .t-eyebrow{ font-size:10px; font-weight:700; letter-spacing:1.5px; }
    .green{ fill:#2da44e; } .amber{ fill:#bf8700; }
    .s-green{ stroke:#2da44e; } .s-amber{ stroke:#bf8700; } .s-grey{ stroke:#768390; }
    .flow{ fill:none; stroke-width:2; }
  </style>
  <defs>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#2da44e"/></marker>
    <marker id="aa" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#bf8700"/></marker>
    <marker id="ak" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#768390"/></marker>
  </defs>

  <!-- SESSION -->
  <g>
    <rect class="panel" x="250" y="24" width="440" height="92" rx="12"/>
    <text class="ink t-title" x="272" y="52">Claude Code session <tspan class="muted" font-weight="400" font-size="12px">· any repo, any machine</tspan></text>
    <text class="ink t-lbl" x="272" y="76"><tspan class="mono t-code green" font-weight="700">SessionStart · UserPromptSubmit</tspan> read memory into context</text>
    <text class="ink t-lbl" x="272" y="98"><tspan class="mono t-code" font-weight="700">SessionEnd · PreCompact</tspan> queue the transcript</text>
  </g>

  <!-- VAULT (hero) -->
  <g>
    <rect x="356" y="206" width="228" height="140" rx="14" fill="var(--panel)" stroke="#2da44e" stroke-width="2"/>
    <text class="ink t-vault" x="470" y="238" text-anchor="middle">THE VAULT</text>
    <text class="muted t-lbl" x="470" y="258" text-anchor="middle" class="muted t-lbl">a git repo you own</text>
    <!-- mini note card -->
    <rect class="sub" x="380" y="272" width="180" height="56" rx="7"/>
    <line x1="392" y1="287" x2="470" y2="287" stroke="#2da44e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="392" y1="300" x2="548" y2="300" stroke="var(--line)" stroke-width="2" stroke-linecap="round"/>
    <line x1="392" y1="312" x2="520" y2="312" stroke="var(--line)" stroke-width="2" stroke-linecap="round"/>
    <text class="muted mono" x="470" y="342" text-anchor="middle" font-size="10.5px">notes/*.md  +  SQLite FTS5 (BM25)</text>
  </g>

  <!-- WORKER -->
  <g>
    <rect class="panel" x="70" y="404" width="264" height="100" rx="12"/>
    <text class="green t-eyebrow" x="90" y="428">WORKER</text>
    <text class="ink t-title" x="90" y="450" font-size="14px" class="mono ink" >worker.mjs</text>
    <text class="muted t-lbl" x="90" y="472">distill → score outcome → judge</text>
    <text class="muted t-lbl" x="90" y="491"><tspan class="mono" font-size="11px">tests pass / build green</tspan> → earned Q</text>
  </g>

  <!-- NIGHTLY -->
  <g>
    <rect class="panel" x="606" y="404" width="264" height="100" rx="12"/>
    <text class="amber t-eyebrow" x="626" y="428">NIGHTLY</text>
    <text class="ink mono" x="626" y="450" font-size="14px" font-weight="700">consolidate.mjs</text>
    <text class="muted t-lbl" x="626" y="472">git-diff invalidate · verify · decay</text>
    <text class="muted t-lbl" x="626" y="491">arbiter · auto-link · repo cards</text>
  </g>

  <!-- FLOWS -->
  <!-- inject: vault -> session (up) -->
  <path class="flow s-green" d="M424,206 L424,120" marker-end="url(#ag)"/>
  <text class="green t-arrow" x="414" y="150" text-anchor="end">inject</text>
  <text class="muted" x="414" y="166" text-anchor="end" font-size="10px">retrieve.mjs · retrieve-prompt.mjs</text>
  <text class="muted" x="414" y="180" text-anchor="end" font-size="10px">situation-keyed, pitfalls flagged</text>

  <!-- queue: session -> worker (down-left) -->
  <path class="flow s-grey" d="M300,116 C250,190 205,300 200,404" marker-end="url(#ak)"/>
  <text class="ink t-arrow" x="150" y="250" text-anchor="middle" transform="rotate(-4 150 250)">queue transcript</text>
  <text class="muted mono" x="150" y="266" text-anchor="middle" font-size="10px" transform="rotate(-4 150 266)">enqueue.mjs</text>

  <!-- learn: worker -> vault (up-right) -->
  <path class="flow s-green" d="M320,404 C368,378 372,366 384,344" marker-end="url(#ag)"/>
  <text class="green t-arrow" x="360" y="392" text-anchor="start">new notes + Q</text>

  <!-- maintain: nightly -> vault (up-left) -->
  <path class="flow s-amber" d="M620,404 C572,378 568,366 556,344" marker-end="url(#aa)"/>
  <text class="amber t-arrow" x="582" y="392" text-anchor="end">verify · decay</text>

  <!-- config tuned annotation -->
  <path class="flow s-grey" d="M690,150 C740,180 748,230 620,268" marker-end="url(#ak)" stroke-dasharray="4 4" stroke-width="1.5"/>
  <text class="muted" x="742" y="150" text-anchor="start" font-size="10px">eval + improve.mjs</text>
  <text class="muted" x="742" y="164" text-anchor="start" font-size="10px">tune-weights.mjs</text>
  <text class="muted" x="742" y="178" text-anchor="start" font-size="10px" font-style="italic">fit the ranking weights</text>

  <!-- footer: dashboard + value prop -->
  <g transform="translate(300,542)">
    <rect x="0" y="-9" width="15" height="11" rx="1.5" fill="none" stroke="var(--muted)" stroke-width="1.3"/>
    <line x1="7.5" y1="2" x2="7.5" y2="5" stroke="var(--muted)" stroke-width="1.3"/>
    <line x1="3.5" y1="5" x2="11.5" y2="5" stroke="var(--muted)" stroke-width="1.3"/>
    <text class="muted" x="24" y="1" font-size="11px">Every step is observable on the live dashboard at <tspan class="mono ink" font-weight="600">localhost:7777</tspan> · zero dependencies, the vault is yours</text>
  </g>
</svg>
